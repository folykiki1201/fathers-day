<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>给爸爸的一封信</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="gift" aria-label="给爸爸的父亲节信封礼物">
      <section class="stage" aria-live="polite">
        <div class="memory-ring" aria-hidden="true">
          <figure class="memory memory-1">
            <img src="assets/photo-01.jpg" alt="" />
          </figure>
          <figure class="memory memory-2">
            <img src="assets/photo-02.jpg" alt="" />
          </figure>
          <figure class="memory memory-3">
            <img src="assets/photo-03.jpg" alt="" />
          </figure>
          <figure class="memory memory-4">
            <img src="assets/photo-04.jpg" alt="" />
          </figure>
        </div>

        <article class="letter" aria-label="给爸爸的信">
          <img
            class="letter-art"
            src="assets/letter.png"
            alt="给爸爸的手写信"
            onerror="this.hidden = true; document.querySelector('.letter-fallback').hidden = false"
          />
          <div class="letter-fallback" hidden>
            <p>小时候，你牵着我往前走</p>
            <p>以后，换我陪你慢慢走</p>
            <p class="sign">父亲节快乐 ❤️</p>
          </div>
        </article>

        <div class="envelope" aria-hidden="true">
          <div class="envelope-back"></div>
          <div class="envelope-letter-peek"></div>
          <div class="envelope-front"></div>
          <div class="envelope-flap"></div>
          <div class="seal"></div>
        </div>

        <div class="intro-copy">
          <p>给爸爸的一封信</p>
          <h1>父亲节快乐</h1>
        </div>

        <button class="open-button" type="button" aria-expanded="false">
          <span class="button-open">打开信封</span>
          <span class="button-close">重新合上</span>
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
